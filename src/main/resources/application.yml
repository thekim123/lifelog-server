spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lifelog
    username: lifelog
    password: lifelog
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:lifelog-ocr-consumer}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  jwt:
    # 32 bytes 이상 권장. 운영에서는 반드시 환경변수/시크릿 매니저 사용
    secret: "change-this-to-a-long-random-secret-key-at-least-32-bytes"
    access-token-expiry-seconds: 3600
  events:
    enabled: ${EVENTS_ENABLED:true}
    ocr-requested-topic: ${OCR_REQUESTED_TOPIC:ocr.requested}
    ocr-completed-topic: ${OCR_COMPLETED_TOPIC:ocr.completed}
    ocr-failed-topic: ${OCR_FAILED_TOPIC:ocr.failed}
    ocr-dlq-topic: ${OCR_DLQ_TOPIC:ocr.dlq}
    ocr-consumer-group: ${OCR_CONSUMER_GROUP:lifelog-ocr-consumer}
  ocr:
    provider: ${OCR_PROVIDER:mock}
